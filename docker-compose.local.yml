version: '3.8'

services:
  # ===========================================================================
  # DATABASE (PostgreSQL) - Mission Control usa Postgres, no MySQL
  # ===========================================================================
  db:
    image: postgres:15-alpine
    container_name: jeikei_postgres_local
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-jeikei_station}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jeikei-net
    restart: unless-stopped

  # ===========================================================================
  # OLLAMA (Local LLM) - Mantenido si necesitas modelos locales
  # ===========================================================================
  ollama:
    build:
      context: .
      dockerfile: Dockerfile.ollama
    container_name: openclaw-ollama-local
    ports:
      - "11434:11434"
    volumes:
      # Solo necesitamos mapear los datos del modelo, el script ya está dentro por el Dockerfile
      - ollama_data:/root/.ollama
    networks:
      - jeikei-net
    restart: unless-stopped

  # ===========================================================================
  # OPENCLAW GATEWAY
  # ===========================================================================
  openclaw-app:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: openclaw-app-local
    ports:
      - "5000:5000"
      - "8001:8001"
    volumes:
      # Sincroniza tu configuración local con el contenedor
      - ./openclaw_production/.openclaw:/app/.openclaw
      # Volúmenes persistentes
      - openclaw_memory:/app/.openclaw/memory
      - openclaw_sessions:/app/.openclaw/agents/main/sessions
      - openclaw_identity:/app/.openclaw/identity
    environment:
      - NODE_ENV=development
      - OPENCLAW_HOME=/app
      - OLLAMA_BASE_URL=http://openclaw-ollama-local:11434
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    networks:
      - jeikei-net
    restart: unless-stopped
    depends_on:
      - ollama

  # ===========================================================================
  # JEIKEI API (Backend)
  # ===========================================================================
  jeikei_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jeikei_api_server_local
    command: pnpm run dev:backend
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - PORT=3001
      - NODE_ENV=development
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-jeikei_station}
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - jeikei-net
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  # ===========================================================================
  # JEIKEI VITE (Frontend)
  # ===========================================================================
  jeikei_frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jeikei_vite_frontend_local
    command: pnpm run dev:frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - PORT=3000
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:3001
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - jeikei-net
    restart: unless-stopped
    depends_on:
      - jeikei_api

volumes:
  postgres_data:
  ollama_data:
  openclaw_memory:
  openclaw_sessions:
  openclaw_identity:


networks:
  jeikei-net:
    driver: bridge
