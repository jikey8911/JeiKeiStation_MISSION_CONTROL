version: '3.8'

services:
  # ===========================================================================
  # DATABASE (MySQL)
  # ===========================================================================
  mysql:
    image: mysql:8.0
    container_name: jeikei_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: jeikei_user
      MYSQL_PASSWORD: jeikei_password
      MYSQL_DATABASE: jeikei_station
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jeikei-net
    restart: unless-stopped

  # ===========================================================================
  # REDIS (Cache)
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: openclaw-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - jeikei-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # OLLAMA (Local LLM) - Optimized for CPU only if GPU not available
  # ===========================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: openclaw-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - jeikei-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:11434/api/tags" ]
      interval: 15s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # OPENCLAW GATEWAY
  # ===========================================================================
  openclaw-app:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: openclaw-app
    ports:
      - "5000:5000"
      - "8001:8001"
    volumes:
      - ./openclaw_production/.openclaw:/root/.openclaw
      - openclaw_data:/root/data
      - openclaw_cache:/root/cache
    environment:
      - NODE_ENV=production
      - OPENCLAW_HOME=/root
      - OLLAMA_BASE_URL=http://openclaw-ollama:11434
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    networks:
      - jeikei-net
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ===========================================================================
  # JEIKEI API (Backend)
  # ===========================================================================
  jeikei_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jeikei_api_server
    command: pnpm run dev:backend
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - PORT=3001
      - NODE_ENV=development
      - CI=true
    volumes:
      - .:/app
      - /app/node_modules
      - /app/client/node_modules
      - /app/server/node_modules
      - /app/shared/node_modules
    networks:
      - jeikei-net
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy

  # ===========================================================================
  # JEIKEI VITE (Frontend)
  # ===========================================================================
  jeikei_frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jeikei_vite_frontend
    command: pnpm run dev:frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - PORT=3000
      - CI=true
    volumes:
      - .:/app
      - /app/node_modules
      - /app/client/node_modules
      - /app/server/node_modules
      - /app/shared/node_modules
    networks:
      - jeikei-net
    restart: unless-stopped
    depends_on:
      - jeikei_api

volumes:
  mysql_data:
  redis_data:
  ollama_data:
  openclaw_data:
  openclaw_cache:

networks:
  jeikei-net:
    driver: bridge
