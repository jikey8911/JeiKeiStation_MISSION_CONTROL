name: 🔄 Sync Depl to Deployment Repo

on:
  push:
    branches:
      - depl

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout depl branch
        uses: actions/checkout@v4
        with:
          ref: depl
          fetch-depth: 0

      - name: 🔄 Push to Deployment Repository (Main)
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          if [ -z "$DEPLOY_TOKEN" ]; then
            echo "❌ Error: DEPLOY_TOKEN is not set in GitHub Secrets."
            exit 1
          fi
          
          git remote add deployment "https://x-access-token:${DEPLOY_TOKEN}@github.com/jikey8911/JeiKeiStattion_DokerDep.git" || git remote set-url deployment "https://x-access-token:${DEPLOY_TOKEN}@github.com/jikey8911/JeiKeiStattion_DokerDep.git"
          
          echo "🚀 Pushing depl branch to deployment:main..."
          git push deployment HEAD:main --force
