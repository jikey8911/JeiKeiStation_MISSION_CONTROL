name: 🚀 Deploy Direct to Oracle

on:
  push:
    branches:
      - depl

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Update Oracle Cloud
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        with:
          host: 147.224.220.58
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GITHUB_TOKEN
          connect_timeout: 30s
          script: |
            # 1. Definir la carpeta en Oracle y la URL con el Token
            PROJECT_DIR="/home/ubuntu/JeiKeiStation_MISSION_CONTROL"
            REPO_URL="https://oauth2:$GITHUB_TOKEN@github.com/jikey8911/JeiKeiStation_MISSION_CONTROL.git"

            # 2. Clonar la rama 'depl' si la carpeta no existe
            if [ ! -d "$PROJECT_DIR" ]; then
              echo "📥 Clonando repositorio por primera vez..."
              git clone -b depl $REPO_URL $PROJECT_DIR
            fi
            
            cd $PROJECT_DIR
            
            # 3. Forzar la descarga de los últimos cambios
            echo "🔄 Sincronizando código..."
            git fetch origin depl
            git reset --hard origin/depl
            
            # 4. Levantar Docker
            echo "🚀 Desplegando contenedores..."
            sudo docker compose -f docker-compose.prod.yml down
            sudo docker compose -f docker-compose.prod.yml up -d --build
            sudo docker image prune -f