name: 🔄 Sync to DockerDep and Deploy to Oracle

on:
  push:
    branches:
      - depl  # Se activa cuando actualizas 'depl'

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout MISSION_CONTROL (depl)
        uses: actions/checkout@v4
        with:
          ref: depl
          fetch-depth: 0

      - name: 🔄 Push to JeiKeiStattion_DokerDep (main)
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }} # El token ghp_ que creamos
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          # Configurar el remoto del repo de despliegue
          REMOTE_URL="https://x-access-token:${DEPLOY_TOKEN}@github.com/jikey8911/JeiKeiStattion_DokerDep.git"
          git remote add target "$REMOTE_URL"
          
          # Forzar la rama 'depl' actual hacia la 'main' del repo de destino
          echo "🚀 Sincronizando repositorios..."
          git push target HEAD:main --force

      - name: 🚀 SSH and Update Oracle Cloud
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 147.224.220.58
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "✅ Conectado a Oracle Cloud"
            cd /home/ubuntu/JeiKeiStattion_DokerDep || git clone https://github.com/jikey8911/JeiKeiStattion_DokerDep.git /home/ubuntu/JeiKeiStattion_DokerDep
            cd /home/ubuntu/JeiKeiStattion_DokerDep
            
            # Actualizar código local en la VM
            git fetch origin main
            git reset --hard origin/main
            
            # Recargar contenedores
            echo "🔄 Reiniciando Docker Services..."
            docker compose down
            docker compose up -d --build
            
            # Limpieza de imágenes huérfanas para no llenar el disco de Oracle
            docker image prune -f