name: 🔄 Sync and Deploy

on:
  push:
    branches:
      - depl

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Branch
        uses: actions/checkout@v4
        with:
          ref: depl
          fetch-depth: 0

      - name: 🔄 Sync Repositories
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          git config --global user.email "juanguzmanescandonfp@gmail.com"
          git config --global user.name "jikey8911"
          
          # Construimos la URL con tu usuario y el token directamente
          REMOTE_URL="https://jikey8911:${DEPLOY_TOKEN}@github.com/jikey8911/JeiKeiStattion_DokerDep.git"
          
          git remote add target "$REMOTE_URL" || git remote set-url target "$REMOTE_URL"
          
          echo "🚀 Forzando sincronización hacia JeiKeiStattion_DokerDep:main..."
          git push target HEAD:main --force

      - name: 🚀 Update Oracle Cloud
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 147.224.220.58
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/JeiKeiStattion_DokerDep || exit
            
            # 1. Traer los cambios del repo de despliegue
            git fetch origin main
            git reset --hard origin/main
            
            # 2. Levantar usando ESPECÍFICAMENTE el archivo de producción
            echo "🔄 Desplegando con docker-compose.prod.yml..."
            
            # Usamos -f para forzar el archivo de producción
            sudo docker compose -f docker-compose.prod.yml down
            sudo docker compose -f docker-compose.prod.yml up -d --build
            
            # 3. Limpieza automática
            sudo docker image prune -f