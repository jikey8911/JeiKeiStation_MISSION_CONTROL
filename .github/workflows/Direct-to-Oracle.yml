name: 🚀 Deploy Direct to Oracle

on:
  push:
    branches:
      - depl

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Update Oracle Cloud
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        with:
          host: 147.224.220.58
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GITHUB_TOKEN
          script: |
            PROJECT_DIR="/home/ubuntu/JeiKeiStation_MISSION_CONTROL"
            REPO_URL="https://oauth2:$GITHUB_TOKEN@github.com/jikey8911/JeiKeiStation_MISSION_CONTROL.git"

            # 1. Si la carpeta existe pero está vacía o corrupta (sin .git), la borramos
            if [ -d "$PROJECT_DIR" ] && [ ! -d "$PROJECT_DIR/.git" ]; then
              echo "⚠️ Carpeta sin repositorio detectada. Limpiando..."
              rm -rf "$PROJECT_DIR"
            fi

            # 2. Clonar el repositorio si la carpeta no existe
            if [ ! -d "$PROJECT_DIR" ]; then
              echo "📥 Clonando repositorio por primera vez..."
              git clone -b depl $REPO_URL $PROJECT_DIR
            fi
            
            # Entramos a la carpeta del proyecto
            cd $PROJECT_DIR || exit
            
            # 3. Forzar la descarga exacta de la rama depl
            echo "🔄 Sincronizando código con la rama depl..."
            git fetch origin depl
            git reset --hard origin/depl
            
            # --- NUEVO PASO: Destruir contenedores conflictivos ---
            echo "🧹 Limpiando contenedores huérfanos..."
            sudo docker rm -f openclaw-app jeikei_mysql openclaw-redis openclaw-ollama || true
            
            # 4. Reconstruir imágenes si es necesario (sin tumbar los servicios aún)
            echo "🏗️ Construyendo nuevas imágenes (si hay cambios)..."
            sudo docker compose -f docker-compose.prod.yml build
            
            # 5. Levantar Docker usando el archivo de producción (recrea solo lo que cambió)
            echo "🚀 Desplegando contenedores (actualizando sin downtime completo)..."
            sudo docker compose -f docker-compose.prod.yml up -d
            
            # 6. Limpiar sistema para no llenar el disco de Oracle
            echo "🧹 Limpiando imágenes sin uso..."
            sudo docker image prune -f
