name: Deploy Specific Service

on:
  push:
    branches:
      - 'service/**'
      - 'feature/**'

env:
  REGISTRY: ghcr.io

jobs:
  detect-service:
    runs-on: ubuntu-latest
    outputs:
      service: ${{ steps.detect.outputs.service }}
      should_deploy: ${{ steps.detect.outputs.should_deploy }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect service from branch
        id: detect
        run: |
          BRANCH=${{ github.ref_name }}
          
          # Extraer nombre del servicio de la rama
          # Ej: service/frontend, service/backend, service/ollama
          if [[ $BRANCH =~ ^service/([a-z-]+)$ ]]; then
            SERVICE="${BASH_REMATCH[1]}"
            echo "service=$SERVICE" >> $GITHUB_OUTPUT
            echo "should_deploy=true" >> $GITHUB_OUTPUT
            echo "✅ Detectado servicio: $SERVICE"
          else
            echo "should_deploy=false" >> $GITHUB_OUTPUT
            echo "⚠️  Rama no detectada como service"
          fi

  deploy-frontend:
    needs: detect-service
    if: needs.detect-service.outputs.should_deploy == 'true' && needs.detect-service.outputs.service == 'frontend'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Frontend to Oracle Cloud
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ORACLE_CLOUD_HOST }}
          username: ${{ secrets.ORACLE_CLOUD_USER }}
          key: ${{ secrets.ORACLE_CLOUD_SSH_KEY }}
          script: |
            cd /opt/jeikei
            git pull origin ${{ github.ref_name }}
            
            echo "🚀 Redeployando Frontend..."
            docker-compose -f docker-compose.prod.yml build jeikei_frontend
            docker-compose -f docker-compose.prod.yml up -d jeikei_frontend
            
            echo "✅ Frontend actualizado"
            docker ps | grep jeikei_frontend

  deploy-backend:
    needs: detect-service
    if: needs.detect-service.outputs.should_deploy == 'true' && needs.detect-service.outputs.service == 'backend'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Backend to Oracle Cloud
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ORACLE_CLOUD_HOST }}
          username: ${{ secrets.ORACLE_CLOUD_USER }}
          key: ${{ secrets.ORACLE_CLOUD_SSH_KEY }}
          script: |
            cd /opt/jeikei
            git pull origin ${{ github.ref_name }}
            
            echo "🚀 Redeployando Backend..."
            docker-compose -f docker-compose.prod.yml build jeikei_api
            docker-compose -f docker-compose.prod.yml up -d jeikei_api
            
            echo "✅ Backend actualizado"
            docker ps | grep jeikei_api

  deploy-openclaw:
    needs: detect-service
    if: needs.detect-service.outputs.should_deploy == 'true' && needs.detect-service.outputs.service == 'openclaw'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy OpenClaw to Oracle Cloud
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ORACLE_CLOUD_HOST }}
          username: ${{ secrets.ORACLE_CLOUD_USER }}
          key: ${{ secrets.ORACLE_CLOUD_SSH_KEY }}
          script: |
            cd /opt/jeikei
            git pull origin ${{ github.ref_name }}
            
            echo "🚀 Redeployando OpenClaw..."
            docker-compose -f docker-compose.prod.yml build openclaw-app
            docker-compose -f docker-compose.prod.yml up -d openclaw-app
            
            echo "✅ OpenClaw actualizado"
            docker ps | grep openclaw-app

  deploy-ollama:
    needs: detect-service
    if: needs.detect-service.outputs.should_deploy == 'true' && needs.detect-service.outputs.service == 'ollama'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Ollama to Oracle Cloud
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ORACLE_CLOUD_HOST }}
          username: ${{ secrets.ORACLE_CLOUD_USER }}
          key: ${{ secrets.ORACLE_CLOUD_SSH_KEY }}
          script: |
            cd /opt/jeikei
            git pull origin ${{ github.ref_name }}
            
            echo "🚀 Redeployando Ollama..."
            docker-compose -f docker-compose.prod.yml pull ollama
            docker-compose -f docker-compose.prod.yml up -d ollama
            
            echo "✅ Ollama actualizado"
            docker ps | grep ollama
