services:
  ollama:
    image: ollama/ollama:latest
    container_name: openclaw-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      # 1. Montamos el script dentro del contenedor
      - ./ollama-init.sh:/ollama-init.sh
    networks:
      - openclaw-net
    restart: unless-stopped

    # 2. Reemplazamos el entrypoint para ejecutar nuestro script
    entrypoint: [ "/bin/bash", "/ollama-init.sh" ]

    # Asignación a la GPU 1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['GPU-acbd3522-032c-939c-9f42-9957d69242e1']
              capabilities: [ gpu ]

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:11434/api/tags" ]
      interval: 15s
      timeout: 5s
      retries: 5
    environment:
      - OLLAMA_NUM_PARALLEL=1

volumes:
  ollama_data:


networks:
  openclaw-net:
    name: jeikeistation_mission_control_openclaw-net
    external: true
