services:
  # ===========================================================================
  # DATABASE (PostgreSQL) - Aislada por Seguridad
  # ===========================================================================
  db:
    image: postgres:15-alpine
    container_name: jeikei_postgres_prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-jeikei_station}
    # 🚨 Sin directiva 'ports' para que no sea accesible desde Internet
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jeikei-net
    restart: always # Crítico para servidores en la nube

  # ===========================================================================
  # OLLAMA (Local LLM) - Aislado en la red interna
  # ===========================================================================
  ollama:
    build:
      context: .
      dockerfile: Dockerfile.ollama
    container_name: openclaw-ollama-prod
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - jeikei-net
    restart: always

  # ===========================================================================
  # OPENCLAW GATEWAY
  # ===========================================================================
  openclaw-app:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: openclaw-app-prod
    ports:
      - "5000:5000"
      - "8001:8001"
    volumes:
      - ./openclaw_production/.openclaw:/app/.openclaw
      # Volúmenes persistentes administrados por Docker
      - openclaw_memory:/app/.openclaw/memory
      - openclaw_sessions:/app/.openclaw/agents/main/sessions
      - openclaw_identity:/app/.openclaw/identity
    environment:
      - NODE_ENV=production
      - OPENCLAW_HOME=/app
      - OLLAMA_BASE_URL=http://openclaw-ollama-prod:11434
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    networks:
      - jeikei-net
    restart: always
    depends_on:
      - ollama

  # ===========================================================================
  # JEIKEI API (Backend)
  # ===========================================================================
  jeikei_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jeikei_api_server_prod
    # Usamos comandos de producción
    command: sh -c "pnpm install --prod && pnpm run start:backend"
    ports:
      - "3001:3001"
    env_file:
      - .env.production
    environment:
      - PORT=3001
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-jeikei_station}
    networks:
      - jeikei-net
    restart: always
    depends_on:
      db:
        condition: service_healthy

  # ===========================================================================
  # JEIKEI VITE (Frontend)
  # ===========================================================================
  jeikei_frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jeikei_vite_frontend_prod
    ports:
      - "80:80"
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      # Reemplaza esta IP en tu .env.production por la IP pública de Oracle
      - VITE_API_URL=${VITE_API_URL:-http://localhost:3001}
    networks:
      - jeikei-net
    restart: always
    depends_on:
      - jeikei_api

  # ===========================================================================
  # WATCHTOWER (Actualización Automática)
  # ===========================================================================
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true # Elimina imágenes antiguas
      - WATCHTOWER_POLL_INTERVAL=300 # Verifica cada 5 minutos
      - WATCHTOWER_INCLUDE_RESTARTING=true
    networks:
      - jeikei-net
    restart: always

volumes:
  postgres_data:
  ollama_data:
  openclaw_memory:
  openclaw_sessions:
  openclaw_identity:

networks:
  jeikei-net:
    driver: bridge
