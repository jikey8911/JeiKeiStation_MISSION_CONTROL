version: '3.8'

services:
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: openclaw-app
    env_file:
      - .env
    ports:
      - "5000:5000"
      - "8001:8001"
    volumes:
      # Mapeo del cerebro de producción
      - ./openclaw_production/.openclaw:/root/.openclaw
      # Mapeo del código para lectura/escritura
      - .:/root/workspace
      # Almacenamiento persistente
      - openclaw_prod_data:/root/.openclaw/data
      - openclaw_prod_cache:/root/.openclaw/cache
    environment:
      - NODE_ENV=production
      - OPENCLAW_HOME=/root
      - OPENCLAW_CONFIG=/root/.openclaw/openclaw.json
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    networks:
      - openclaw-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  openclaw_prod_data:
  openclaw_prod_cache:


networks:
  openclaw-net:
    name: jeikeistation_prod_network
    driver: bridge
