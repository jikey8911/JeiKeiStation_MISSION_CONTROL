services:
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: openclaw-app
    ports:
      - "5000:5000"
      - "8001:8001"
    volumes:
      - ./openclaw_config/openclaw.json:/root/.openclaw/openclaw.json
      - ./openClawSettings/agents.json:/root/agents/agents.json
      - ./openClawSettings/skills.json:/root/skills/skills.json
      - openclaw_data:/root/.openclaw/data
      - openclaw_cache:/root/.openclaw/cache
    environment:
      NODE_ENV: production
      OPENCLAW_HOME: /root
      OLLAMA_BASE_URL: http://openclaw-ollama:11434
    networks:
      - jeikeistation_mission_control_openclaw-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/health" ]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  openclaw_data:
  openclaw_cache:

networks:
  jeikeistation_mission_control_openclaw-net:
    driver: bridge
    external: true
