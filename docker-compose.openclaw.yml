version: '3.8'

services:
  # ===========================================================================
  # GATEWAY PRINCIPAL DE OPENCLAW
  # ===========================================================================
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: openclaw-app
    ports:
      - "5000:5000"
      - "8001:8001"
    volumes:
      # Sincronización maestra: Mapeamos tu carpeta actual (donde está .openclaw) al /root del contenedor.
      # Esto evita duplicados y asegura que la sincronización sea instantánea.
      - ./:/root
      # Persistencia de datos y caché en volúmenes de Docker para mantener tu carpeta de Windows limpia
      - openclaw_data:/root/data
      - openclaw_cache:/root/cache
    env_file:
      # Ruta directa a tu archivo de variables oculto en la nueva estructura
      - ./.openclaw/.env
    environment:
      - NODE_ENV=production
      - OPENCLAW_HOME=/root
      # Le decimos explícitamente a OpenClaw dónde encontrar su cerebro
      - OPENCLAW_CONFIG=/root/openclaw.json
      - OLLAMA_BASE_URL=http://openclaw-ollama:11434
    networks:
      - openclaw-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/health" ]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  openclaw_data:
  openclaw_cache:


networks:
  openclaw-net:
    name: jeikeistation_mission_control_openclaw-net
    driver: bridge
