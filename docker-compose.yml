version: '3.8'

services:
  # ===========================================================================
  # BASE DE DATOS
  # ===========================================================================
  mysql:
    image: mysql:8.0
    container_name: jeikei_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: jeikei_user
      MYSQL_PASSWORD: jeikei_password
      MYSQL_DATABASE: jeikei_station
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jeikei-net
    restart: unless-stopped

  # ===========================================================================
  # OLLAMA (Local LLM Provider)
  # ===========================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: openclaw-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama-init.sh:/ollama-init.sh
    networks:
      - jeikei-net
    restart: unless-stopped
    entrypoint: [ "/bin/bash", "/ollama-init.sh" ]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]

  # ===========================================================================
  # API BACKEND (NODE)
  # ===========================================================================
  jeikei_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jeikei_api_server
    command: sh -c "pnpm install && pnpm run dev:backend"
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - PORT=3001
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules
      - /app/client/node_modules
      - /app/server/node_modules
      - /app/shared/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - jeikei-net
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy

  # ===========================================================================
  # FRONTEND (VITE)
  # ===========================================================================
  jeikei_frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jeikei_vite_frontend
    command: sh -c "pnpm install && pnpm run dev:frontend"
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - PORT=3000
      - VITE_API_URL=http://localhost:3001
    volumes:
      - .:/app
      - /app/node_modules
      - /app/client/node_modules
      - /app/server/node_modules
      - /app/shared/node_modules
    depends_on:
      - jeikei_api
    networks:
      - jeikei-net
    restart: unless-stopped

  # ===========================================================================
  # AGENTE OPENCLAW - MODO PRODUCCIÓN (v2026.3.13)
  # ===========================================================================
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: openclaw-app
    ports:
      - "5000:5000"
      - "8001:8001"
    env_file:
      - .env
    volumes:
      # Raíz del proyecto para operación directa de los agentes
      - .:/root/workspace
      # Persistencia de configuración oficial
      - ./openclaw_production/.openclaw:/root/.openclaw
      # Directorios adicionales para evitar colisiones
      - ./openclaw_production/workspace:/root/openclaw_workspace
      - ./openclaw_production/skills:/root/skills
    environment:
      - NODE_ENV=production
      - OPENCLAW_HOME=/root/.openclaw
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - jeikei-net
    restart: unless-stopped
    depends_on:
      - jeikei_api

volumes:
  mysql_data:
  ollama_data:

networks:
  jeikei-net:
    driver: bridge
