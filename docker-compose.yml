services:
  # ===========================================================================
  # BASE DE DATOS
  # ===========================================================================
  mysql:
    image: mysql:8.0
    container_name: jeikei_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: jeikei_user
      MYSQL_PASSWORD: jeikei_password
      MYSQL_DATABASE: jeikei_station
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ===========================================================================
  # API BACKEND (NODE)
  # ===========================================================================
  jeikei_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jeikei_api_server
    command: ["/app/scripts/entrypoint.sh"]
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - PORT=3001
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  # ===========================================================================
  # FRONTEND (VITE)
  # ===========================================================================
  jeikei_frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jeikei_vite_frontend
    command: ["pnpm", "run", "dev"]
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - PORT=3000
      - VITE_API_URL=http://localhost:3001
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - jeikei_api
    restart: unless-stopped

  # ===========================================================================
  # AGENTE OPENCLAW (PYTHON)
  # ===========================================================================
  openclaw_agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: openclaw_python_worker
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - jeikei_api
    environment:
      - JEIKEI_API_URL=http://jeikei_api:3001/api/trpc
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    volumes:
      - .:/app
    restart: unless-stopped

volumes:
  mysql_data:
