version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: jeikei_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: jeikei_user
      MYSQL_PASSWORD: jeikei_password
      MYSQL_DATABASE: jeikei_station
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  jeikei_platform:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jeikei_node_platform
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=mysql://jeikei_user:jeikei_password@mysql:3306/jeikei_station
      - PORT=3000
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  openclaw_agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: openclaw_python_worker
    depends_on:
      - jeikei_platform
    environment:
      - BASE_URL=http://jeikei_platform:3000/api/trpc
      - API_KEY=jk_secret_agent_key_2026
    volumes:
      - .:/app
    restart: unless-stopped

volumes:
  mysql_data:
