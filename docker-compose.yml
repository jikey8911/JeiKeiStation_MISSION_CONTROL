services:
  # ===========================================================================
  # # BASE DE DATOS (POSTGRESQL 16)
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: jeikei_postgres
    environment:
      POSTGRES_USER: jeikei_user
      POSTGRES_PASSWORD: jeikei_password
      POSTGRES_DB: jeikei_station
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jeikei_user -d jeikei_station"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ===========================================================================
  # # API BACKEND (NODE)
  # ===========================================================================
  jeikei_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jeikei_api_server
    command: ["/app/scripts/entrypoint.sh"]
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - PORT=3001
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ===========================================================================
  # # FRONTEND (VITE)
  # ===========================================================================
  jeikei_frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jeikei_vite_frontend
    command: ["pnpm", "run", "dev"]
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - PORT=3000
      - VITE_API_URL=http://localhost:3001
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - jeikei_api
    restart: unless-stopped

  # ===========================================================================
  # # AGENTE OPENCLAW (PYTHON)
  # ===========================================================================
  openclaw_agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: openclaw_python_worker
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - jeikei_api
    environment:
      - JEIKEI_API_URL=http://jeikei_api:3001/api/trpc
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    volumes:
      - .:/app
    restart: unless-stopped

volumes:
  postgres_data:
