version: '3.8'

services:
  # ===========================================================================
  # BASE DE DATOS
  # ===========================================================================
  mysql:
    image: mysql:8.0
    container_name: jeikei_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: jeikei_user
      MYSQL_PASSWORD: jeikei_password
      MYSQL_DATABASE: jeikei_station
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jeikei-net
    restart: unless-stopped

  # ===========================================================================
  # API BACKEND (NODE)
  # ===========================================================================
  jeikei_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jeikei_api_server
    command: pnpm run dev:backend
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - PORT=3001
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules
      - /app/client/node_modules
      - /app/server/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - jeikei-net
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy

  # ===========================================================================
  # FRONTEND (VITE)
  # ===========================================================================
  jeikei_frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jeikei_vite_frontend
    command: pnpm run dev:frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - PORT=3000
      - VITE_API_URL=http://localhost:3001
    volumes:
      - .:/app
      - /app/node_modules
      - /app/client/node_modules
      - /app/server/node_modules
    depends_on:
      - jeikei_api
    networks:
      - jeikei-net
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  jeikei-net:
    driver: bridge
