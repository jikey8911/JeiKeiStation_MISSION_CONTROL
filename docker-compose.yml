
services:
  # Base de Datos MySQL
  mysql:
    image: mysql:8.0
    container_name: jeikei_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: jeikei_user
      MYSQL_PASSWORD: jeikei_password
      MYSQL_DATABASE: jeikei_station
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  # Plataforma Node.js (Backend tRPC + Frontend Vite)
  jeikei_platform:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jeikei_node_platform
    ports:
      - "3000:3000"  # API y WebSocket de tRPC
      - "5173:5173"  # Interfaz de Usuario (Vite) y HMR
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - mysql
    restart: unless-stopped

  # Agente DevOps de IA (Python)
  openclaw_agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: openclaw_python_worker
    ports:
      - "8000:8000" # Puerto del Agente expuesto para comunicación interna/externa
    env_file:
      - .env
    depends_on:
      - jeikei_platform
    environment:
      # URL interna para que el agente le hable a la API de Node
      - JEIKEI_API_URL=http://jeikei_platform:3000/api/trpc
      # Pasamos el token de GitHub desde el .env para las operaciones de Git
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    volumes:
      - .:/app # Permite al agente leer y editar el código fuente directamente
    restart: unless-stopped

volumes:
  mysql_data: