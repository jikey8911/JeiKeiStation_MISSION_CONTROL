services:
  # ===========================================================================
  # # BASE DE DATOS (POSTGRESQL)
  # ===========================================================================
  postgres:
    image: postgres:16
    container_name: jeikei_postgres
    environment:
      POSTGRES_USER: jeikei_user
      POSTGRES_PASSWORD: jeikei_password
      POSTGRES_DB: jeikei_station
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # # HEALTHCHECK: Asegura que la DB esté lista antes de levantar Node
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jeikei_user -d jeikei_station"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ===========================================================================
  # # PLATAFORMA CENTRAL (NODE + VITE)
  # ===========================================================================
  jeikei_platform:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jeikei_node_platform
    ports:
      - "3000:3000"  # Puerto Unificado (HTTP + WebSockets + Vite HMR)
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy # # Espera al Healthcheck de PostgreSQL
    restart: unless-stopped

  # ===========================================================================
  # # AGENTE OPENCLAW (PYTHON)
  # ===========================================================================
  openclaw_agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: openclaw_python_worker
    ports:
      - "8000:8000" # # Puerto activo con FastAPI
    env_file:
      - .env
    depends_on:
      - jeikei_platform
    environment:
      # # Forzamos las rutas dinámicas para sobreescribir cualquier hardcode
      - JEIKEI_API_URL=http://jeikei_platform:3000/api/trpc
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    volumes:
      - .:/app
    restart: unless-stopped

volumes:
  postgres_data:
