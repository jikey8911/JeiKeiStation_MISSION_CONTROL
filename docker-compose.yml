services:
  # ===========================================================================
  # BASE DE DATOS
  # ===========================================================================
  mysql:
    image: mysql:8.0
    container_name: jeikei_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: jeikei_user
      MYSQL_PASSWORD: jeikei_password
      MYSQL_DATABASE: jeikei_station
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ===========================================================================
  # API BACKEND (NODE)
  # ===========================================================================
  jeikei_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jeikei_api_server
    command: [ "/app/scripts/entrypoint.sh" ]
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - PORT=3001
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  # ===========================================================================
  # FRONTEND (VITE)
  # ===========================================================================
  jeikei_frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jeikei_vite_frontend
    command: pnpm run dev:frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - PORT=3000
      - VITE_API_URL=http://localhost:3001
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - jeikei_api
    restart: unless-stopped

  # ===========================================================================
  # AGENTE OPENCLAW (NODE)
  # ===========================================================================
  openclaw_agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: openclaw_python_worker
    profiles:
      - agents
    ports:
      - "5000:5000"
      - "8000:8000"
    volumes:
      - ./openclaw.json:/root/.openclaw/config.json:ro
      - ./openclaw/agents:/root/.openclaw/agents:ro
      - ./openclaw/skills:/root/.openclaw/skills:ro
      - openclaw_data:/root/.openclaw/data
      - openclaw_cache:/root/.openclaw/cache
    environment:
      NODE_ENV: production
      OPENCLAW_CONFIG: /root/.openclaw/config.json
      LOG_LEVEL: info
    restart: unless-stopped

  # Servicio opcional: Redis para caché
  redis:
    image: redis:7-alpine
    container_name: openclaw-redis
    profiles:
      - agents
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass openclaw123
    environment:
      - REDIS_PASSWORD=openclaw123
    networks:
      - default
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  openclaw_data:
  openclaw_cache:
  redis_data:
